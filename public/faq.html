<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCDA - FAQ</title>
</head>
<link rel="stylesheet" href="styles/index.css">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link rel="icon" type="image/png" href="/photos/favicon.ico" sizes="32x32">

<style>
  ul li::before { content: "" !important; }
  .faq-answer { display: none; }
  .faq-item.open .faq-answer { display: block; }
  .faq-item.open .faq-chevron { transform: rotate(180deg); }
  .faq-chevron { transition: transform 0.2s ease; }
</style>

<body>
  <header class="hicad-header">
    <a href="index.html" class="hicad-logo">
      <img src="/photos/OCDA-Logo3.png" alt="ocda-logo" class="ocda-logoIdentity">
    </a>
    <nav class="hicad-navbar" id="navbar">
      <a href="aboutus.html">About Us</a>
      <a href="news.html">News & Events</a>
      <a href="contact.html">Contact Us</a>
      <a href="member.html">Members</a>
      <a href="adminlog.html">Admin</a>
      <a href="faq.html" class="home-active">FAQ</a>
    </nav>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </header>

  <section class="support-section fade-in-section py-8">
    <div class="container mx-auto px-4 max-w-3xl">
      <h2 class="text-xl md:text-2xl lg:text-3xl font-bold mb-6">Frequently Asked Questions (FAQ)</h2>
      <div id="faqList" class="space-y-3">
        <p class="text-gray-500 text-sm">Loading FAQ...</p>
      </div>
    </div>
  </section>

  <script>
    async function loadFaq() {
      const list = document.getElementById('faqList');
      try {
        const res = await fetch('/admin/faq');
        const data = await res.json();

        if (!data.length) {
          list.innerHTML = '<p class="text-gray-500 text-sm">No FAQ entries available yet.</p>';
          return;
        }

        list.innerHTML = data.map((item, i) => `
          <div class="faq-item border rounded-lg bg-white shadow-sm" id="faq-${i}">
            <button class="w-full text-left px-5 py-4 flex justify-between items-center font-semibold text-gray-800 hover:bg-gray-50 transition-colors"
              onclick="toggleFaq(${i})">
              <span>${item.question}</span>
              <svg class="faq-chevron w-5 h-5 text-gray-400 shrink-0 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <div class="faq-answer px-5 pb-4 text-gray-700 text-sm leading-relaxed border-t">
              <div class="pt-3">${item.answer.replace(/\n/g, '<br>')}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('FAQ load error:', err);
        list.innerHTML = '<p class="text-red-500 text-sm">Unable to load FAQ at this time.</p>';
      }
    }

    function toggleFaq(index) {
      const item = document.getElementById(`faq-${index}`);
      item.classList.toggle('open');
    }

    document.addEventListener('DOMContentLoaded', loadFaq);
  </script>
</body>
<script src="script/index.js"></script>
</html>
