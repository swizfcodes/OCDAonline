<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact US</title>
</head>
<link rel="stylesheet" href="styles/index.css">
<link rel="icon" type="image/png" href="/photos/favicon.ico" sizes="32x32">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="text/javascript">
  (function () {
    emailjs.init({ publicKey: "PdTYJ7_aos2Uu7P7L" });
  })();
</script>
<style>
  :root {
    --bg-color: #081b29;
    --second-bg-color: #112e42;
    --text-color: #ededed;
    --main-color: #94c2d8;
    --accent-color: #00bcd4;
    --hover-bg: rgba(255, 255, 255, 0.1);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-color: #f8fafc;
      --second-bg-color: #ffffff;
      --text-color: #1a202c;
      --main-color: #2563eb;
      --accent-color: #0891b2;
      --hover-bg: rgba(0, 0, 0, 0.05);
    }
  }

  @media (max-width: 4000px) and (min-width: 1700px) {
    section { font-size: 60% !important; }
  }

  .glass-form {
    background: var(--second-bg-color);
    backdrop-filter: blur(10px);
    border: 1px solid var(--hover-bg);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
  }

  .glass-card {
    background: var(--second-bg-color);
    backdrop-filter: blur(10px);
    border: 1px solid var(--hover-bg);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
  }

  .glass-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    background: var(--hover-bg);
  }

  .contact-section {
    background: var(--bg-color);
    min-height: 100vh;
    position: relative;
  }

  .contact-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(148,194,216,0.1)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
    opacity: 0.3;
  }

  .content-wrapper { position: relative; z-index: 1; }

  .input-field {
    background: var(--second-bg-color);
    border: 2px solid var(--hover-bg);
    color: var(--text-color);
    transition: all 0.3s ease;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--main-color);
    box-shadow: 0 0 0 3px rgba(148, 194, 216, 0.2);
    background: var(--second-bg-color);
  }

  .input-field::placeholder {
    color: var(--text-color);
    opacity: 0.6;
  }

  .send-button {
    background: var(--main-color);
    color: var(--second-bg-color);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .send-button::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
  }

  .send-button:hover::before { left: 100%; }

  .send-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(148, 194, 216, 0.3);
    background: var(--accent-color);
  }

  .section-title {
    color: var(--text-color);
    position: relative;
  }

  .section-title::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 0;
    width: 50px; height: 3px;
    background: var(--main-color);
    border-radius: 2px;
  }

  .contact-info-item {
    transition: all 0.3s ease;
    color: var(--text-color);
  }

  .contact-info-item:hover { color: var(--main-color); }

  .card-title { color: var(--text-color); }

  .phone-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.5rem;
  }

  .fade-in { animation: fadeIn 0.8s ease-out; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stagger-1 { animation-delay: 0.1s; }
  .stagger-2 { animation-delay: 0.2s; }
  .stagger-3 { animation-delay: 0.3s; }
  .stagger-4 { animation-delay: 0.4s; }
  .stagger-5 { animation-delay: 0.5s; }

  @media (max-width: 768px) {
    .phone-grid { grid-template-columns: 1fr; }
  }

  /* Dynamic content block from admin */
  .dynamic-contact-block {
    white-space: pre-wrap;
    line-height: 1.9;
    font-size: 0.95rem;
  }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--hover-bg) 25%, rgba(255,255,255,0.08) 50%, var(--hover-bg) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 1em;
    margin-bottom: 0.5em;
  }

  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }
</style>

<body>
  <!-- Header -->
  <header class="hicad-header">
    <a href="index.html" class="hicad-logo">
      <img src="/photos/OCDA-Logo3.png" alt="ocda-logo" class="ocda-logoIdentity">
    </a>
    <nav class="hicad-navbar" id="navbar">
      <a href="aboutus.html">About Us</a>
      <a href="news.html">News &amp; Events</a>
      <a href="contact.html" class="home-active">Contact Us</a>
      <a href="member.html">Members</a>
      <a href="adminlog.html">Admin</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </header>

  <section class="contact-section py-16 px-6 md:px-16">
    <div class="content-wrapper max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">

      <!-- Contact Form -->
      <div class="glass-form rounded-xl p-8 space-y-6 fade-in">
        <h2 class="section-title text-3xl font-bold pb-4 mb-6">Send Us a Message</h2>
        <div class="space-y-4">
          <input type="text" id="fullname" placeholder="Full Name" required
            class="input-field w-full p-4 rounded-lg text-gray-700 placeholder-gray-500" />
          <input type="email" id="email_id" placeholder="Email Address" required
            class="input-field w-full p-4 rounded-lg text-gray-700 placeholder-gray-500" />
          <textarea id="message" placeholder="Your Message" rows="5" required
            class="input-field w-full p-4 rounded-lg text-gray-700 placeholder-gray-500 resize-none"></textarea>
          <button id="sendBtn" onclick="sendMail()"
            class="send-button w-full text-white py-4 px-6 rounded-lg font-semibold text-lg">
            Send Message
          </button>
        </div>
      </div>

      <!-- Dynamic Contact Info -->
      <div class="space-y-8" id="contactInfoSection">
        <h2 class="section-title text-3xl font-bold pb-4 mb-6" id="contactInfoTitle">Contact Information</h2>

        <!-- Skeleton shown while loading -->
        <div id="contactSkeleton" class="glass-card p-6 rounded-xl fade-in space-y-3">
          <div class="skeleton" style="width:60%"></div>
          <div class="skeleton" style="width:80%"></div>
          <div class="skeleton" style="width:70%"></div>
          <div class="skeleton" style="width:90%"></div>
          <div class="skeleton" style="width:65%"></div>
        </div>

        <!-- Actual content injected here -->
        <div id="contactInfoCards" class="space-y-8 hidden"></div>
      </div>

    </div>
  </section>

  <script>
    // Load dynamic contact info from admin
    async function loadContactInfo() {
      try {
        const res = await fetch('/admin/contactus');
        const skeleton = document.getElementById('contactSkeleton');
        const cards    = document.getElementById('contactInfoCards');
        const titleEl  = document.getElementById('contactInfoTitle');

        if (res.ok) {
          const data = await res.json();
          skeleton.classList.add('hidden');
          cards.classList.remove('hidden');

          if (data && data.content) {
            if (data.title) titleEl.textContent = data.title;
            // Render the content inside a styled glass card
            cards.innerHTML = `
              <div class="glass-card p-6 rounded-xl fade-in stagger-1">
                <div class="contact-info-item dynamic-contact-block">${data.content.replace(/\n/g, '<br>')}</div>
              </div>`;
          } else {
            cards.innerHTML = `
              <div class="glass-card p-6 rounded-xl fade-in stagger-1">
                <p class="contact-info-item text-sm">Contact information will be available shortly.</p>
              </div>`;
          }
        } else {
          throw new Error('Failed to load');
        }
      } catch (err) {
        console.error('Failed to load contact info:', err);
        document.getElementById('contactSkeleton').innerHTML =
          '<p class="contact-info-item text-sm">Unable to load contact information at this time.</p>';
      }
    }

    function sendMail() {
      const fullname = document.getElementById("fullname").value.trim();
      const email_id = document.getElementById("email_id").value.trim();
      const message  = document.getElementById("message").value.trim();
      const btn      = document.getElementById("sendBtn");

      if (!fullname || !email_id || !message) {
        alert('Please fill in all fields.');
        return;
      }

      btn.innerHTML = 'Sending...';
      btn.disabled  = true;

      emailjs.send("service_9rpkjl6", "template_ub32eow", {
        from_name:  fullname,
        from_email: email_id,
        message:    message
      }).then(function (response) {
        alert('Message sent successfully!');
        document.getElementById("fullname").value = "";
        document.getElementById("email_id").value = "";
        document.getElementById("message").value  = "";
      }, function (error) {
        console.log('FAILED...', error);
        alert('Failed to send message. Please try again later.');
      }).finally(function () {
        btn.innerHTML = 'Send Message';
        btn.disabled  = false;
      });
    }

    // Intersection observer for fade-in animations
    document.addEventListener('DOMContentLoaded', function () {
      loadContactInfo();

      const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, observerOptions);

      document.querySelectorAll('.fade-in').forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        observer.observe(el);
      });
    });
  </script>
</body>
<script src="script/index.js"></script>
</html>
